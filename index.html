<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cvBuilder Pro | Visual LaTeX Editor</title>
    
    <link rel="stylesheet" href="styles.css">
    
    <script>
        // Global storage for templates fetched from the database
        window.resumeTemplates = [];
    </script>
</head>
<body>

    <!-- SECTION 1: TEMPLATE SELECTION -->
    <div id="selection-screen">
        <header class="hero-section">
            <h1 style="color: #333; margin-top: 50px;">Choose Your Resume Template</h1>
            <p style="color: #666; font-size: 16px;">Select a professional design to start building your LaTeX CV.</p>
        </header>
        <div class="template-grid" id="template-grid"></div>
    </div>

    <!-- SECTION 2: RESUME BUILDER EDITOR -->
    <div id="builder-screen" style="display: none;">
        <div class="container">
            <header class="header-bar">
                <div class="brand">
                    <h2>cvBuilder <span style="color: #4285F4;">Pro</span></h2>
                </div>

                <!-- DYNAMIC AUTH SECTION: Script.js will swap content here -->
                <div id="auth-section">
                    <a href="/auth/google" class="btn-google-login" style="
                        background-color: #4285F4; 
                        color: white; 
                        padding: 10px 20px; 
                        text-decoration: none; 
                        border-radius: 5px; 
                        font-weight: bold;
                        display: inline-block;
                    ">Login with Google</a>
                </div>

                <button class="btn-back" onclick="goBackToSelection()">← Change Template</button>
            </header>

            <form id="resumeForm">
                <!-- DRAGGABLE CANVAS AREA -->
                <div id="builder-canvas">
                    
                    <!-- HEADER SECTION -->
                    <div class="draggable-section" id="core-header" data-type="header">
                        <div class="section-header-flex">
                            <h3 class="collapsible-title" onclick="toggleSection(this)">
                                <span class="toggle-icon">▼</span> Personal Information
                            </h3>
                        </div>
                        <div class="flex-row">
                            <div><label>Full Name</label><input type="text" id="name" value="Sarthak Narula"></div>
                            <div><label>Phone</label><input type="text" id="phone" value="+91 00000 00000"></div>
                        </div>
                        <div class="flex-row">
                            <div><label>Email</label><input type="email" id="email" value="your.email@example.com"></div>
                            <div><label>Links (LinkedIn/GitHub)</label><input type="text" id="links" value="github.com/username"></div>
                        </div>
                    </div>

                    <!-- EDUCATION SECTION -->
                    <div class="draggable-section" id="core-edu" data-type="education">
                        <div class="section-header-flex">
                            <div style="display:flex; align-items:center; width:60%;">
                                <span class="toggle-icon" onclick="toggleSection(this)" style="cursor:pointer; padding:5px;">▼</span>
                                <input type="text" class="core-sec-title custom-sec-title-input" value="Education">
                            </div>
                            <div class="section-controls">
                                <span class="drag-handle" title="Drag to reorder">☰</span>
                                <button type="button" class="btn-remove-section" onclick="removeCoreSection('core-edu', 'Education')">✖ Remove</button>
                            </div>
                        </div>
                        <div id="education-container"></div>
                        <button type="button" class="btn-add" onclick="addEducation()">+ Add Another Education</button>
                    </div>

                    <!-- WORK EXPERIENCE SECTION -->
                    <div class="draggable-section" id="core-work" data-type="work">
                        <div class="section-header-flex">
                            <div style="display:flex; align-items:center; width:60%;">
                                <span class="toggle-icon" onclick="toggleSection(this)" style="cursor:pointer; padding:5px;">▼</span>
                                <input type="text" class="core-sec-title custom-sec-title-input" value="Experience">
                            </div>
                            <div class="section-controls">
                                <span class="drag-handle" title="Drag to reorder">☰</span>
                                <button type="button" class="btn-remove-section" onclick="removeCoreSection('core-work', 'Experience')">✖ Remove</button>
                            </div>
                        </div>
                        <div id="work-container"></div>
                        <button type="button" class="btn-add" onclick="addWorkExperience()">+ Add New Company</button>
                    </div>

                    <!-- PROJECTS SECTION -->
                    <div class="draggable-section" id="core-proj" data-type="project">
                        <div class="section-header-flex">
                            <div style="display:flex; align-items:center; width:60%;">
                                <span class="toggle-icon" onclick="toggleSection(this)" style="cursor:pointer; padding:5px;">▼</span>
                                <input type="text" class="core-sec-title custom-sec-title-input" value="Projects">
                            </div>
                            <div class="section-controls">
                                <span class="drag-handle" title="Drag to reorder">☰</span>
                                <button type="button" class="btn-remove-section" onclick="removeCoreSection('core-proj', 'Projects')">✖ Remove</button>
                            </div>
                        </div>
                        <div id="project-container"></div>
                        <button type="button" class="btn-add" onclick="addProject()">+ Add Project</button>
                    </div>

                    <!-- TECHNICAL SKILLS SECTION -->
                    <div class="draggable-section" id="core-skill" data-type="skill">
                        <div class="section-header-flex">
                            <div style="display:flex; align-items:center; width:60%;">
                                <span class="toggle-icon" onclick="toggleSection(this)" style="cursor:pointer; padding:5px;">▼</span>
                                <input type="text" class="core-sec-title custom-sec-title-input" value="Technical Skills">
                            </div>
                            <div class="section-controls">
                                <span class="drag-handle" title="Drag to reorder">☰</span>
                                <button type="button" class="btn-remove-section" onclick="removeCoreSection('core-skill', 'Technical Skills')">✖ Remove</button>
                            </div>
                        </div>
                        <div class="flex-row">
                            <div><label>Languages/Tools</label><input type="text" id="sk1" value="C++, Java, Python, SQL"></div>
                            <div><label>Frameworks/Libraries</label><input type="text" id="sk2" value="React, Node.js, Express"></div>
                            <div><label>Developer Tools</label><input type="text" id="sk3" value="Git, Docker, VS Code"></div>
                        </div>
                    </div>

                </div>

                <!-- ADD SECTION MENU -->
                <div class="bottom-action-area">
                    <button type="button" class="btn-add-between" onclick="toggleAddMenu(event, this)">+ Add New Section</button>
                    <div class="add-menu"></div>
                </div>

                <!-- PRIMARY ACTIONS -->
                <div class="action-buttons">
                    <button type="button" class="btn-secondary" id="btn-generate">Preview LaTeX</button>
                    <!-- THE NEW PRO FEATURE BUTTON -->
                    <button type="button" class="btn-pro" id="btn-save-cloud" style="background-color: #6c5ce7; color: white;">☁ Save to Cloud</button>
                    <button type="button" class="btn-success" id="btn-download">Download PDF</button>
                </div>
            </form>
        </div>

        <!-- CODE OUTPUT PANEL -->
        <div class="container">
            <h3>LaTeX Source (Overleaf Compatible)</h3>
            <p style="font-size: 12px; color: #666; margin-top: 0;">Copy this code directly into Overleaf for advanced editing.</p>
            <textarea id="output" readonly onclick="this.select()" placeholder="LaTeX code will appear here..."></textarea>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
